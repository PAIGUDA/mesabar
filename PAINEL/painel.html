<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitorização - Mesa Bar Luanda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-6 font-sans">

    <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-amber-500 tracking-wider uppercase">Mesa Bar Luanda</h1>
            <p class="text-xs text-gray-400">Painel de Atendimento em Tempo Real (PC do Bar)</p>
        </div>
        <div class="text-right">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20">
                <span class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></span> Sistema Ativo
            </span>
        </div>
    </header>

    <div id="noCalls" class="flex flex-col items-center justify-center h-64 border-2 border-dashed border-gray-800 rounded-3xl text-gray-500">
        <i class="fa-solid fa-bell-slash text-4xl mb-3"></i>
        <p class="text-sm">Nenhum cliente a chamar de momento. Excelente trabalho!</p>
    </div>

    <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
        </div>

    <script>
        // CONFIGURAÇÃO DO GOOGLE FIREBASE (Insira exatamente o mesmo link aqui!)
        const firebaseConfig = {
            databaseURL: "AQUI_VAI_O_SEU_LINK_DO_FIREBASE"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const cardsContainer = document.getElementById('cardsContainer');
        const noCalls = document.getElementById('noCalls');

        // Função para gerar um BIP áudio nativo sem depender de ficheiros externos
        function tocarAlertaSonoro() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            
            osc.connect(gain);
            gain.connect(context.destination);
            
            osc.type = "sine";
            osc.frequency.value = 880; // Frequência do Bip
            gain.gain.setValueAtTime(0.3, context.currentTime); // Volume
            
            osc.start();
            osc.stop(context.currentTime + 0.3); // Duração do som (0.3 segundos)
        }

        // Escuta qualquer mudança na base de dados em tempo real
        database.ref('chamados').on('value', (snapshot) => {
            cardsContainer.innerHTML = '';
            const dados = snapshot.val();

            if (!dados) {
                noCalls.classList.remove('hidden');
                return;
            }

            let temChamadosPendentes = false;

            Object.keys(dados).forEach(key => {
                const chamado = dados[key];
                
                if (chamado.estado === "pendente") {
                    temChamadosPendentes = true;
                    tocarAlertaSonoro();

                    const card = document.createElement('div');
                    card.className = "bg-red-950/40 border border-red-500/30 p-5 rounded-2xl flex flex-col justify-between shadow-xl animate-pulse";
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-red-600 text-white font-bold text-xs px-2.5 py-1 rounded-lg">MESA DETETADA</span>
                                <span class="text-xs text-gray-400"><i class="fa-regular fa-clock"></i> ${chamado.dataHora}</span>
                            </div>
                            <h2 class="text-3xl font-black text-white mb-2">Mesa ${chamado.mesa}</h2>
                            <p class="text-xs text-gray-300 mb-5">O cliente solicita a presença de um empregado para atendimento físico.</p>
                        </div>
                        <button onclick="resolverChamado('${chamado.mesa}')" class="w-full py-3 bg-green-600 hover:bg-green-700 active:scale-95 text-white text-xs font-bold rounded-xl flex items-center justify-center gap-2 transition-all cursor-pointer">
                            <i class="fa-solid fa-check"></i> Marcar como Atendido
                        </button>
                    `;
                    cardsContainer.appendChild(card);
                }
            });

            if (temChamadosPendentes) {
                noCalls.classList.add('hidden');
            } else {
                noCalls.classList.remove('hidden');
            }
        });

        // Apaga o alerta da base de dados (remove do ecrã de forma limpa)
        function resolverChamado(mesa) {
            database.ref('chamados/' + mesa).remove();
        }
    </script>
</body>
</html>
