<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa Bar - Luanda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-gold: #e5c158;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(10, 6, 3, 0.92), rgba(15, 9, 5, 0.96)), url('IMAGEM DE FUNDO.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .menu-item-transition { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-white min-h-screen pb-32">

    <div id="custom-alert" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-[#1a110a] border-2 border-[#e5c158] text-white px-6 py-4 rounded-2xl shadow-2xl z-[10000] font-semibold text-center backdrop-blur-md max-w-[85%] transition-all duration-300">
        Bem-vindo ao Mesa Bar!
    </div>

    <header class="w-full text-center pt-12 pb-8 px-4 flex flex-col items-center bg-gradient-to-b from-[#1a110a] to-transparent">
        <div class="relative mb-6">
            <img src="LOGO MESA BAR.jpg" alt="Logótipo Mesa Bar" class="w-44 h-44 rounded-full object-cover border-4 border-[#e5c158] shadow-[0_0_30px_rgba(229,193,88,0.3)] bg-[#1a110a]" onerror="this.src='https://placehold.co/180x180/1a110a/e5c158?text=Mesa+Bar';">
        </div>
        
        <h1 class="text-4xl font-black tracking-widest uppercase text-white drop-shadow-md">Mesa Bar</h1>
        <div class="text-[#e5c158] text-xs tracking-[0.5em] font-bold mt-2 mb-6">LUANDA</div>
        
        <!-- Mamboo Link atualizado -->
        <a href="https://mamb.app/MglAd" target="_blank" class="flex items-center gap-2 bg-[#e5c158] px-6 py-3 rounded-full font-bold text-black hover:bg-[#d4b04a] transition-all shadow-lg hover:scale-105 active:scale-95 mb-4">
            <i class="fas fa-link"></i> Aceder Mamboo
        </a>

        <div class="flex items-center gap-2 bg-black/60 px-5 py-2.5 rounded-full border border-[#e5c158]/20 backdrop-blur-md text-xs text-[#d1c7bd]">
            <i class="fas fa-map-marker-alt text-[#e5c158]"></i> 
            Rua Cónego Manuel das Neves, Kinaxixi, Luanda
        </div>
    </header>

    <section class="w-full max-w-2xl mx-auto px-6 mb-8 text-center">
        <p class="text-[#d1c7bd] text-xs tracking-[0.2em] uppercase font-bold mb-4">Acompanhe-nos Online</p>
        <div class="flex justify-center gap-6">
            <a href="https://instagram.com/restaurante_mesabar" target="_blank" class="text-[#d1c7bd] text-lg w-12 h-12 rounded-full bg-[#1a110a] border border-white/10 flex items-center justify-center hover:text-[#e5c158] hover:border-[#e5c158] transition-all">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://facebook.com/mesabar" target="_blank" class="text-[#d1c7bd] text-lg w-12 h-12 rounded-full bg-[#1a110a] border border-white/10 flex items-center justify-center hover:text-[#e5c158] hover:border-[#e5c158] transition-all">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://wa.me/244933809681" target="_blank" class="text-[#d1c7bd] text-lg w-12 h-12 rounded-full bg-[#1a110a] border border-white/10 flex items-center justify-center hover:text-[#e5c158] hover:border-[#e5c158] transition-all">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </section>

    <section class="w-full max-w-2xl mx-auto px-4 mb-8">
        <div class="text-[#e5c158] text-xs uppercase tracking-[0.3em] font-extrabold mb-4 flex items-center justify-center gap-3">
            <span class="w-10 h-[1px] bg-[#e5c158]/50"></span>
            Agenda e Destaques
            <span class="w-10 h-[1px] bg-[#e5c158]/50"></span>
        </div>
        
        <div class="flex gap-4 overflow-x-auto pb-4 px-2 no-scrollbar snap-x justify-center">
            <div class="min-w-[280px] bg-[#1a110a]/95 rounded-2xl border border-[#e5c158]/20 overflow-hidden shadow-lg">
                <div class="p-4"><h3 class="text-sm font-extrabold text-white">Eventos</h3></div>
            </div>
        </div>
    </section>

    <nav class="w-full sticky top-0 z-[1000] bg-[#0f0905]/95 border-b border-[#e5c158]/20 backdrop-blur-md flex gap-3 overflow-x-auto px-4 py-4 no-scrollbar">
        <button class="category-btn active px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-[#e5c158] text-[#150905]" onclick="switchCategory('comidas', this)">Menu de Comidas</button>
        <button class="category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-white/5 text-[#d1c7bd]" onclick="switchCategory('bebidas', this)">Bebidas & Cafetaria</button>
        <button class="category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-white/5 text-[#d1c7bd]" onclick="switchCategory('bar', this)">Bar & Espirituosas</button>
    </nav>

    <main class="w-full max-w-2xl mx-auto px-4 mt-6">
        <div id="menu-items" class="space-y-8"></div>
    </main>

    <script>
        const database = {
            comidas: { "Entradas": [{ nome: "Couvert", preco: "4.500 Kz", desc: "Pão fresco, manteiga." }] },
            bebidas: { "Cafetaria": [{ nome: "Café Delta", preco: "1.000 Kz", desc: "Expresso Delta." }] },
            bar: { "Gin": [{ nome: "Beefeater", preco: "4.500 Kz", desc: "Gin clássico." }] }
        };

        function showNotification(message) {
            const alertBox = document.getElementById('custom-alert');
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 3000);
        }

        function switchCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.className = "category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-white/5 text-[#d1c7bd]");
            btn.className = "category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-[#e5c158] text-[#150905]";
            const container = document.getElementById('menu-items');
            container.innerHTML = '';
            // Logic to render items...
        }

        document.addEventListener('DOMContentLoaded', () => {
            showNotification("Bem-vindo ao Mesa Bar!");
            switchCategory('comidas', document.querySelector('.category-btn'));
        });
    </script>
</body>
</html>
