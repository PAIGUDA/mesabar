        function showNotification(message) {
            const alertBox = document.getElementById('custom-alert');
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 3000);
        }

        function switchCategory(cat, btn) {
            document.querySelectorAll('.category-btn').forEach(b => {
                b.className = "category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-white/5 text-[#d1c7bd]";
            });
            btn.className = "category-btn px-6 py-3 rounded-full text-xs font-black uppercase whitespace-nowrap bg-[#e5c158] text-[#150905]";
            
            const container = document.getElementById('menu-items');
            container.innerHTML = '';
            
            const categoryData = database[cat];
            for (const section in categoryData) {
                const sectionDiv = document.createElement('div');
                sectionDiv.innerHTML = `<h2 class="text-[#e5c158] font-bold text-sm mb-4 uppercase tracking-widest border-l-2 border-[#e5c158] pl-3">${section}</h2>`;
                categoryData[section].forEach(item => {
                    sectionDiv.innerHTML += `
                        <div class="bg-[#1a110a]/50 p-4 rounded-xl border border-white/5 mb-3 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-white">${item.nome}</h3>
                                ${item.desc ? `<p class="text-xs text-[#d1c7bd] mt-1 italic">${item.desc}</p>` : ''}
                            </div>
                            <span class="font-bold text-[#e5c158] text-sm whitespace-nowrap ml-4">${item.preco}</span>
                        </div>
                    `;
                });
                container.appendChild(sectionDiv);
            }
        }

            showNotification("Bem-vindo ao Mesa Bar!");
