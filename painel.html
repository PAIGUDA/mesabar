<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comandos - Mesa Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .order-card { transition: all 0.3s ease; }
        .status-new { border-left: 4px solid #e5c158; }
        .status-done { border-left: 4px solid #22c55e; opacity: 0.7; }
        .service-request { border: 1px solid #e5c158 !important; background: #261e0b !important; }
    </style>
</head>
<body class="bg-[#0a0603] text-white min-h-screen">

    <header class="bg-[#1a110a] border-b border-[#e5c158]/20 p-6 flex justify-between items-center sticky top-0 z-10 shadow-lg">
        <div>
            <h1 class="text-xl font-black uppercase tracking-widest text-white">Mesa Bar <span class="text-[#e5c158]">| Painel</span></h1>
            <p id="connection-status" class="text-xs text-gray-500 mt-1">A ligar ao sistema...</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="order-count" class="bg-[#e5c158] text-[#1a110a] px-3 py-1 rounded-full font-bold text-xs">0 Pedidos</div>
            <button onclick="window.location.reload()" class="text-xs text-[#d1c7bd] hover:text-white transition-colors">Atualizar</button>
        </div>
    </header>

    <main class="p-6">
        <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Pedidos aparecerão aqui -->
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // IMPORTANTE: Substitua pelos dados do seu Firebase Console
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO_ID",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID_MENSAGENS",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        async function init() {
            try {
                await signInAnonymously(auth);
                document.getElementById('connection-status').textContent = "Sistema Online";
                listenToOrders();
            } catch (e) {
                document.getElementById('connection-status').textContent = "Erro de conexão";
            }
        }

        function listenToOrders() {
            const q = query(collection(db, 'pedidos')); // Coleção 'pedidos'
            
            onSnapshot(q, (snapshot) => {
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = '';
                let activeCount = 0;

                const orders = [];
                snapshot.forEach((doc) => orders.push({ id: doc.id, ...doc.data() }));
                
                orders.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                orders.forEach(order => {
                    if (order.status !== 'done') activeCount++;
                    const isService = order.item === 'Chamar Garçom' || order.item === 'Reserva de Mesa';
                    
                    const card = document.createElement('div');
                    card.className = `order-card bg-[#1a110a] p-5 rounded-xl border border-white/5 ${order.status === 'done' ? 'status-done' : 'status-new'} ${isService ? 'service-request' : ''}`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-2xl font-black ${isService ? 'text-white' : 'text-[#e5c158]'}">
                                ${isService ? '⚠️ ' : ''}Mesa ${order.mesa || '?'}
                            </h2>
                        </div>
                        <div class="mb-4">
                            <p class="text-sm ${isService ? 'font-bold text-[#e5c158]' : 'text-white font-medium'} mb-1">${order.item}</p>
                            <p class="text-xs text-gray-400 italic">${order.obs || 'Sem observações'}</p>
                        </div>
                        ${order.status !== 'done' ? `
                            <button onclick="markDone('${order.id}')" class="w-full py-2 bg-[#e5c158] text-[#1a110a] font-bold text-xs uppercase tracking-wider rounded-lg hover:bg-[#d4b04c] transition-all">
                                Servido
                            </button>
                        ` : `<div class="text-center py-2 text-green-500 font-bold text-xs uppercase">Servido</div>`}
                    `;
                    grid.appendChild(card);
                });
                document.getElementById('order-count').textContent = `${activeCount} Pendentes`;
            });
        }

        window.markDone = async (id) => {
            await updateDoc(doc(db, 'pedidos', id), { status: 'done' });
        };

        init();
    </script>
</body>
</html>
